aid: cohnreznick
name: CohnReznick
description: >-
  CohnReznick is a top-25 US accounting, tax, and advisory firm formed in 2012
  by the merger of J.H. Cohn LLP and Reznick Group, P.C. The firm serves clients
  across more than 30 industries from offices throughout the United States and
  four offshore subsidiaries, with its global reach extended through membership
  in the Nexia International network (operating in more than 128 countries). In
  May 2024 CohnReznick became the first US accounting firm of its scale to
  receive a strategic growth investment from a private equity sponsor when
  funds advised by Apax Partners acquired a majority stake. As part of that
  transaction the firm operates under an alternative-practice structure: audit
  and attest services are delivered by CohnReznick LLP (a licensed CPA firm)
  while tax and advisory services are delivered through CohnReznick Advisory
  LLC. Largest practice areas include Real Estate, Renewable Energy, Government
  Contracting, Asset Management (private equity, hedge funds, private credit,
  REITs), Financial Services, Healthcare, Life Sciences, Consumer & Industrial,
  Technology & Media, Public Sector, and Private Clients (family offices, high
  net worth individuals, professional sports). CohnReznick does not publish a
  public software developer API; this repository documents the firm's
  organizational profile, practice taxonomy, and linked-data context for API
  catalog purposes.
