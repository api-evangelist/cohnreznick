    name: CohnReznick LLP
    description: >-
      Licensed CPA firm that delivers attest, audit, and accounting services
      under the firm's alternative-practice structure.
  - type: LegalStructure
    name: CohnReznick Advisory LLC
    description: >-
      Provides tax and business consulting services under the firm's
      alternative-practice structure; majority owned by Apax-advised funds.
  - type: NetworkAffiliation
    name: Nexia International
    description: >-
      CohnReznick is a member of Nexia, a global network of independent
      accounting and consulting firms whose reach the firm describes as
      extending to "more than 128 countries."
  - type: GlobalDeliveryCenters
    name: Offshore Subsidiaries
    description: >-
      Four offshore subsidiaries support delivery to US clients (India,
      Cayman Islands, and Philippines among the named global affiliates on
      the office locator).
serviceAreas:
  - name: Accounting & Assurance
    description: >-
      Delivered by CohnReznick LLP. Includes Attest & Audit, SEC Audits,
      Employee Benefit Plan audits, Lease Accounting, and accounting advisory.
  - name: Tax
    description: >-
      Federal Tax, International Tax, State & Local Tax, Exempt Organizations
      Tax Services, and tax credits/incentives advisory.
  - name: Advisory
    description: >-
      Accounting Advisory, CFO Advisory, CxO Advisory, Client Advisory
      Services, Managed Services and Outsourced Accounting (MSOA), Business
      Performance, Performance Improvement, Sustainability Advisory.
  - name: Digital
    description: >-
      Cloud Applications, Data and AI, and technology-enabled services
      delivered by CohnReznick's Digital team.
  - name: Transactions
    description: >-
      M&A and divestiture support, including Merger Integration & Carve-Out
      services across the transaction lifecycle.
